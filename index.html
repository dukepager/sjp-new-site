<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOME JAZZ PLAYING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing">

  <!-- Full-screen local video background -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="images/hero-loop.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Landing content -->
  <div class="landing">
    <h1 class="title">JAZZ IS BLACK HAT<br>NOW AVAILABLE</h1>
    <a href="home.html" class="enter-btn">ENTER PAGE</a>
  </div>

  <!-- Transition curtain -->
  <div class="curtain" id="curtain">
    <img src="images/sjp_white.png" alt="Some Jazz Playing" class="curtain-logo" />
  </div>

  <script>
    document.querySelector('.enter-btn').addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.getAttribute('href');
      const curtain = document.getElementById('curtain');
      curtain.classList.add('enter');
      curtain.style.pointerEvents = 'all';
      setTimeout(() => { window.location.href = href; }, 750);
    });
  </script>

</body>
</html>
