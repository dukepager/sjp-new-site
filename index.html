<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOME JAZZ PLAYING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing">

  <!-- Full-screen local video background -->
  <div class="video-bg">
    <video autoplay muted loop playsinline preload="none">
      <source src="images/hero-loop.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Landing content -->
  <div class="landing">
    <h1 class="title">JAZZ IS BLACK HAT<br>AVAILABLE THIS FRIDAY</h1>
    <form class="email-form" id="email-form">
      <input type="email" name="email" placeholder="YOUR EMAIL" required />
      <button type="submit">NOTIFY ME</button>
    </form>
    <p class="form-msg" id="form-msg"></p>
  </div>

  <script>
    const form = document.getElementById('email-form');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const msg = document.getElementById('form-msg');
      const data = new FormData(form);
      try {
        const res = await fetch('https://formspree.io/somejazzplaying@gmail.com', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          msg.textContent = "YOU'RE ON THE LIST.";
          form.reset();
        } else {
          msg.textContent = 'SOMETHING WENT WRONG. TRY AGAIN.';
        }
      } catch {
        msg.textContent = 'SOMETHING WENT WRONG. TRY AGAIN.';
      }
    });
  </script>

</body>
</html>
