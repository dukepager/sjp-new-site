<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOME JAZZ PLAYING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" /></noscript>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-page">

  <!-- Desktop only: video background -->
  <div class="video-bg desktop-only">
    <video autoplay muted loop playsinline preload="none">
      <source src="images/promo.mp4" type="video/mp4" />
    </video>
  </div>

  <div class="overlay desktop-only"></div>

  <button class="landing-sound-btn desktop-only" id="landingSoundBtn" aria-label="Toggle sound">
    <span id="landingSoundLabel">SOUND ON</span>
  </button>

  <!-- Landing content -->
  <div class="landing">
    <h1 class="title">JAZZ IS BLACK HAT<br>AVAILABLE THIS FRIDAY</h1>
    <a href="home.html" class="enter-btn">ENTER SITE</a>
  </div>

  <script>
    if (window.innerWidth > 700) {
      const video = document.querySelector('.video-bg video');
      const btn   = document.getElementById('landingSoundBtn');
      const label = document.getElementById('landingSoundLabel');
      btn.addEventListener('click', function () {
        video.muted = !video.muted;
        label.textContent = video.muted ? 'SOUND ON' : 'SOUND OFF';
      });
    }
  </script>

</body>
</html>
