<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOME JAZZ PLAYING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing">

  <!-- Full-screen local video background -->
  <div class="video-bg">
    <video autoplay muted loop playsinline preload="none">
      <source src="images/hero-loop.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Landing content -->
  <div class="landing">
    <h1 class="title">JAZZ IS BLACK HAT<br>AVAILABLE THIS FRIDAY</h1>
    <div class="form-msg" data-fs-success>YOU'RE ON THE LIST.</div>
    <div class="form-msg form-msg--error" data-fs-error></div>

    <form class="email-form" id="email-form">
      <input type="email" name="email" placeholder="YOUR EMAIL" required data-fs-field />
      <button type="submit" data-fs-submit-btn>NOTIFY ME</button>
    </form>
  </div>

  <script>
    window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
    formspree('initForm', { formElement: '#email-form', formId: 'myklljea' });
  </script>
  <script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
