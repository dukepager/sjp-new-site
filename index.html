<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOME JAZZ PLAYING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing">

  <!-- Full-screen local video background -->
  <div class="video-bg">
    <video autoplay muted loop playsinline preload="none">
      <source src="images/promo.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Sound toggle (desktop only) -->
  <button class="landing-sound-btn" id="landingSoundBtn" aria-label="Toggle sound">
    <span id="landingSoundLabel">SOUND ON</span>
  </button>

  <!-- Landing content -->
  <div class="landing">
    <h1 class="title">JAZZ IS BLACK HAT<br>AVAILABLE THIS FRIDAY</h1>
    <p class="form-msg" id="form-msg"></p>

    <form class="email-form" id="email-form">
      <input type="hidden" name="access_key" value="9c30d0dd-5db6-476e-be34-463e3e83b589" />
      <input type="email" name="email" placeholder="YOUR EMAIL" required />
      <button type="submit">NOTIFY ME</button>
    </form>

    <a href="home.html" class="enter-btn" id="enterBtn">ENTER SITE</a>
  </div>

  <!-- Curtain transition -->
  <div class="curtain" id="curtain">
    <img src="images/sjp_white.png" alt="Some Jazz Playing" class="curtain-logo" />
  </div>

  <audio id="promoAudio" src="images/promo-audio.mp3" loop preload="auto"></audio>

  <!-- TAP FOR SOUND prompt (mobile only) -->
  <button class="mobile-sound-btn" id="mobileSoundBtn">TAP FOR SOUND</button>

  <script>
    // Desktop sound toggle
    if (window.innerWidth > 700) {
      const video = document.querySelector('.video-bg video');
      const btn   = document.getElementById('landingSoundBtn');
      const label = document.getElementById('landingSoundLabel');
      btn.addEventListener('click', function () {
        video.muted = !video.muted;
        label.textContent = video.muted ? 'SOUND ON' : 'SOUND OFF';
      });
    }

    // Mobile sound — triggered by explicit tap on button
    if (window.innerWidth <= 700) {
      const audio  = document.getElementById('promoAudio');
      const mBtn   = document.getElementById('mobileSoundBtn');
      mBtn.addEventListener('click', function () {
        audio.play().then(() => { mBtn.style.display = 'none'; }).catch(() => {});
      });
    }
  </script>

  <script>
    document.getElementById('enterBtn').addEventListener('click', function (e) {
      e.preventDefault();
      if (window.innerWidth <= 700) {
        window.location.href = 'home.html';
        return;
      }
      const curtain = document.getElementById('curtain');
      curtain.classList.add('enter');
      curtain.addEventListener('animationend', function () {
        window.location.href = 'home.html';
      }, { once: true });
    });
  </script>

  <script>
    const form = document.getElementById('email-form');
    const msg  = document.getElementById('form-msg');
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const data = new FormData(form);
      try {
        const res  = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: data
        });
        const json = await res.json();
        if (json.success) {
          msg.textContent = "YOU'RE ON THE LIST.";
          msg.classList.remove('form-msg--error');
          form.reset();
        } else {
          msg.textContent = 'SOMETHING WENT WRONG. TRY AGAIN.';
          msg.classList.add('form-msg--error');
        }
      } catch {
        msg.textContent = 'SOMETHING WENT WRONG. TRY AGAIN.';
        msg.classList.add('form-msg--error');
      }
      msg.style.display = 'block';
    });
  </script>

</body>
</html>
